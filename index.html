<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f6b5c" />
    <meta name="description" content="Apprendo – Ausbildung begleiten mit Wochenrückblicken, Zielen und Roadmap." />
    <meta name="application-name" content="Apprendo" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Apprendo" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Apprendo</title>
    <style>
      html, body { margin: 0; min-height: 100%; }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, #e7f3ef 0%, transparent 42%),
          linear-gradient(180deg, #f7f5f0 0%, #f3f1ec 48%, #ebe7df 100%);
        z-index: 9999;
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
        color: #1c2421;
      }
      #boot-splash[hidden] { display: none; }
      #boot-splash .mark {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        display: block;
        margin: 0 auto;
        animation: pulse 1.4s ease-in-out infinite;
      }
      #boot-splash .word {
        margin-top: 14px;
        font-family: Fraunces, Georgia, serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: #0f6b5c;
        text-align: center;
      }
      #boot-splash .hint {
        margin-top: 6px;
        font-size: 0.875rem;
        color: #5a6862;
        text-align: center;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.72; transform: scale(0.97); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite">
      <div>
        <img class="mark" src="/logo.png" alt="" width="64" height="64" />
        <div class="word">Apprendo</div>
        <div class="hint">Wird geladen…</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
